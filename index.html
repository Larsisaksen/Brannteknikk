<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brannrapport</title>
  <style>
    :root{--bg:#e6e6e6;--paper:#efefef;--ink:#111;--line:#2a2a2a;--soft:#d3cece;--ok:#18c36b;--bad:#ff3737;--white:#fff;--muted:#666}
    *{box-sizing:border-box} body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#202020;color:var(--ink)}
    .app{display:grid;grid-template-columns:420px 1fr;min-height:100vh}.sidebar{background:#f5f5f5;border-right:4px solid #222;padding:18px;overflow:auto}.previewWrap{padding:18px;overflow:auto;background:#1f1f1f}
    .card{background:#fff;border:1px solid #d7d7d7;border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:0 6px 18px rgba(0,0,0,.06)}
    h1,h2,h3,h4{margin:0 0 10px} h1{font-size:22px} h2{font-size:18px} h3{font-size:15px} h4{font-size:14px}.muted{color:var(--muted)}.small{font-size:12px}.tiny{font-size:11px}
    label{display:block;font-size:13px;font-weight:700;margin:0 0 6px} input,textarea,select{width:100%;border:1px solid #cfcfcf;border-radius:8px;padding:10px 11px;font-size:13px;font-family:inherit;background:#fff} textarea{min-height:84px;resize:vertical}
    .row2,.row3{display:grid;gap:10px;margin-bottom:10px}.row2{grid-template-columns:1fr 1fr}.row3{grid-template-columns:1fr 1fr 1fr}.btnRow{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px}
    button{border:none;border-radius:10px;padding:10px 14px;font-weight:700;cursor:pointer;font-size:13px}.btnPrimary{background:#111;color:#fff}.btnSecondary{background:#ececec;color:#111;border:1px solid #cfcfcf}.btnGhost{background:#fff;color:#111;border:1px solid #bcbcbc}
    .moduleGrid{display:grid;gap:8px;margin-top:8px}.moduleOption{display:flex;gap:10px;align-items:flex-start;border:1px solid #dbdbdb;background:#fafafa;border-radius:10px;padding:10px}.moduleOption input{width:auto;margin-top:3px}.moduleOption strong{display:block;font-size:13px}.moduleOption span{font-size:12px;color:#555}
    .moduleForm{border:1px solid #ddd;border-radius:12px;padding:14px;margin-top:14px;background:#fcfcfc}.moduleHeader{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}.pill{display:inline-block;border-radius:999px;padding:4px 8px;font-size:11px;font-weight:700;background:#ececec}
    .findingCard{border:1px solid #d5d5d5;border-radius:10px;padding:12px;margin-top:10px;background:#fff}.uploadBox{border:1px dashed #b8b8b8;background:#fbfbfb;border-radius:10px;padding:10px}.thumbs{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}.thumbs img{width:72px;height:72px;object-fit:cover;border:1px solid #ccc;background:#fff}
    .page{width:794px;min-height:1123px;margin:0 auto 18px;background:var(--paper);border-top:6px solid #1e1e1e;box-shadow:0 4px 22px rgba(0,0,0,.24);padding:34px 34px 40px;page-break-after:always}
    .brand{display:flex;align-items:center;gap:12px;margin-bottom:20px}.brandMark{border:2px solid #111;width:48px;height:26px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:20px;line-height:1;background:#fff}.brandText{font-size:16px;line-height:1.15}
    .mainTitle{display:flex;align-items:center;gap:10px;font-size:21px;font-weight:800;margin-bottom:16px}.flame{width:28px;height:28px;border:2px solid #111;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;background:#fff}
    .heroImg{width:100%;height:215px;object-fit:cover;border:1px solid var(--line);background:#ddd;display:block;margin-bottom:10px}
    table{border-collapse:collapse;width:100%}.reportTable{margin-top:10px;border:1px solid var(--line);font-size:11px;background:transparent}.reportTable th,.reportTable td{border:1px solid var(--line);padding:7px 8px;vertical-align:middle}.reportTable .sectionHead{background:#cfc9c9;text-transform:uppercase;font-weight:800;text-align:center;font-size:11px}
    .center{text-align:center}.summaryStatus{font-weight:700;color:#fff;text-align:center}.statusRed{background:var(--bad);color:#000}.statusGreen{background:var(--ok);color:#000}
    .lawBox{border:1px solid var(--line);margin-top:20px;font-size:11px;background:transparent}.lawBox .head{padding:8px;text-align:center;font-weight:700;border-bottom:1px solid var(--line);background:#cfc9c9}.lawBox .item{padding:6px 10px;border-top:1px solid var(--line);text-align:center}
    .moduleSummaryTable td:first-child{width:30px;text-align:center}.moduleSummaryTable td:last-child{width:105px;text-align:center;font-weight:800}
    .modulePageTitle{width:100%;border:1px solid var(--line);display:grid;grid-template-columns:50px 1fr;font-weight:800;margin-bottom:10px}.modulePageTitle div{padding:8px 10px;border-right:1px solid var(--line);background:#cfc9c9;font-size:16px;text-align:center}.modulePageTitle div:last-child{border-right:none;text-align:center}
    .bulletBox{border:1px solid var(--line);padding:12px 14px;min-height:96px;margin-bottom:10px;background:rgba(255,255,255,0.25)}.bulletBox ul{margin:0;padding-left:18px;font-size:11px;line-height:1.45}
    .statusTable{width:100%;border:1px solid var(--line);margin-bottom:12px;font-size:11px}.statusTable td{border:1px solid var(--line);padding:8px 10px;text-align:center;font-weight:700;background:#cfc9c9}.statusTable .fillGreen{background:var(--ok)}.statusTable .fillRed{background:var(--bad)}
    .deviationTable{border:1px solid var(--line);font-size:11px}.deviationTable th,.deviationTable td{border:1px solid var(--line);padding:6px 7px;vertical-align:top}.deviationTable th{background:#cfc9c9;font-weight:800;text-align:center}.deviationTable td:nth-child(1){width:55px;text-align:center}.deviationTable td:nth-child(2){width:160px}.deviationTable td:nth-child(4){width:125px;text-align:center}
    .photo{width:100px;height:75px;object-fit:cover;border:1px solid #777;background:#f5f5f5}.emptyPhoto{width:100px;height:75px;border:1px dashed #999;display:flex;align-items:center;justify-content:center;font-size:10px;color:#777;margin:0 auto;background:#fafafa}.pageSpacer{height:12px}.screenHint{padding:10px 12px;background:#fff9df;border:1px solid #f0df99;border-radius:10px;font-size:12px;margin-bottom:14px}
    @media (max-width:1200px){.app{grid-template-columns:1fr}.sidebar{border-right:none;border-bottom:4px solid #222}.previewWrap{padding:10px}.page{transform-origin:top center;width:100%;min-height:auto}.row2,.row3{grid-template-columns:1fr}}
    @media print{body{background:#fff}.sidebar{display:none!important}.previewWrap{padding:0;background:#fff}.page{box-shadow:none;margin:0;width:auto;min-height:auto;border-top:0}}
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="card"><h1>Brannrapport</h1></div>

      <div class="card">
        <h2>Grunninformasjon</h2>
        <div class="row2"><div><label>Virksomhet / bygg</label><input id="buildingName" placeholder="F.eks. Sameiet Stadionbygg" /></div><div><label>Dato</label><input id="inspectionDate" type="date" /></div></div>
        <div class="row2"><div><label>Eier</label><input id="owner" placeholder="Eier" /></div><div><label>Eiers representant</label><input id="ownerRep" placeholder="Navn" /></div></div>
        <div class="row2"><div><label>Adresse</label><input id="address" placeholder="Adresse" /></div><div><label>Ant. leietakere / brukere</label><input id="tenants" placeholder="F.eks. 6" /></div></div>
        <div class="row3"><div><label>Type bygning</label><input id="buildingType" placeholder="Kontor / lager / handel" /></div><div><label>Areal</label><input id="area" placeholder="2300 KVM" /></div><div><label>Objekt</label><input id="objectRef" placeholder="A" /></div></div>
        <div class="row3"><div><label>Brannklasse</label><input id="fireClass" placeholder="1" /></div><div><label>Risikoklasse</label><input id="riskClass" placeholder="5" /></div><div><label>TEK</label><input id="tek" placeholder="87/10" /></div></div>
        <div class="row2"><div><label>Brannkonsept</label><select id="docConcept"><option>Ja</option><option selected>Nei</option><option>Delvis</option></select></div><div><label>Branntekniske tegninger</label><select id="docDrawings"><option>Ja</option><option>Nei</option><option selected>Delvis</option></select></div></div>
        <div><label>Forsidebilde</label><input id="coverImage" type="file" accept="image/*" /></div>
      </div>

      <div class="card"><h2>Velg kontrollpunkter</h2><div class="small muted">Brukeren velger først hvilke punkter som skal kontrolleres. Deretter vises kun tilhørende skjemaer lenger ned.</div><div id="moduleOptions" class="moduleGrid"></div></div>

      <div class="card"><h2>Valgte skjemaer</h2><div id="moduleForms"></div><div class="btnRow"><button class="btnPrimary" onclick="renderReport()">Oppdater rapport</button><button class="btnSecondary" onclick="fillDemo()">Fyll eksempeldata</button><button class="btnGhost" onclick="window.print()">Skriv ut / lagre som PDF</button><button class="btnGhost" onclick="resetApp()">Tøm alt</button></div></div>
    </aside>

    <main class="previewWrap">
      <div id="pages"></div>
    </main>
  </div>

<script>
const moduleDefs=[
{id:1,title:"Brannslokkeutstyr - Håndslokkere",bullets:["Slokkeren er montert i henhold til brannteknisk beskrivelse","Slokkeren er montert på veggbrakett, godt festet til vegg","Ettersynsskilt er montert ved slokkeren","På slokker med trykkindikator, skal viseren være på det grønne feltet","Kontrollskiltet fra eksternkontrollør er ikke utløpt","Slokkeren er lett tilgjengelig"]},
{id:2,title:"Brannslokkeutstyr - Brannposter",bullets:["Brannposten er plassert i henhold til brannteknisk tegning","Skapdør er lett å åpne og at lukkemekanismen fungerer","Slangen er lett å rekke ut","Strålerøret er lett å betjene","Ettersyns-/merkeutstyr er montert","Brannposten er lett tilgjengelig"]},
{id:3,title:"Nød- og ledesystem",bullets:["Deksel/armatur er uten skader","Lyskilde/LED lyser","Ettersynsskilt sjekkes på holdbarhet"]},
{id:4,title:"Brannvarslingsanlegg",bullets:["O-plan er leselig og oppdatert","Driftssignal på brannsentralen lyser","Det ikke er feilmeldinger i displayet"]},
{id:5,title:"Rømning og Fluktveier",bullets:["Rømning-/fluktveier er skiltet","Rømning-/fluktveier er lagt opp etter brannteknisk beskrivelse","Rømning-/fluktveier er ryddige og fremkommelige helt ut i det fri","Rømning-/fluktveier skal kunne benyttes uten nøkkel og åpnes lett","Rømning-/fluktveier skal ha fri bredde iht. TEK","I rømningsveier skal det ikke lagres brennbart materiale"]},
{id:6,title:"Brann- og seksjoneringsvegger / branntekniske tegninger",bullets:["Brannskillende konstruksjoner er intakte","Gjennomføringer er branntettet","Tilgjengelige tegninger samsvarer med faktisk situasjon"]},
{id:7,title:"Elektrisk / skjøteledninger etc.",bullets:["Stikkontakter er festet til veggen","Skjøteledninger ikke benyttes til faste installasjoner","Diverse elektriske forhold er visuelt kontrollert"]},
{id:8,title:"Rømningsplaner",bullets:["Rømningsplaner er tilgjengelige der det kreves","Planene er oppdaterte og leselige","Planene henger synlig for ansatte og besøkende"]},
{id:9,title:"Branninstruks",bullets:["Branninstruks beskriver reaksjon ved utløst alarm","Instruksen er synlig oppslått","Instruksen er kjent for brukere/ansatte"]},
{id:10,title:"Evakueringsplaner",bullets:["Evakueringsplan beskriver roller og ansvar","Varslingsrutiner og møtested er angitt","Plan er kjent for relevante brukere"]},
{id:11,title:"Branndører",bullets:["Brannklassifiserte dører står i riktig miljø","Dører er selvlukkende og uten skade","Dører i låst åpen posisjon er koblet til godkjent løsning"]}
];
let state={selectedModules:[],moduleData:{},coverImage:""};
function ensureModuleData(id){if(!state.moduleData[id]) state.moduleData[id]={performed:true,summary:"red",deviations:[{floor:"",location:"",deviation:"",images:[]} ]}; return state.moduleData[id];}
function escapeHtml(str){return (str||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");}
function moduleOptionsMarkup(){return moduleDefs.map(m=>`<label class="moduleOption"><input type="checkbox" ${state.selectedModules.includes(m.id)?"checked":""} onchange="toggleModule(${m.id}, this.checked)" /><div><strong>${m.id}. ${m.title}</strong><span>${m.bullets.length} kontrollpunkter i standardsjekklisten</span></div></label>`).join("");}
function addDeviation(moduleId){ensureModuleData(moduleId).deviations.push({floor:"",location:"",deviation:"",images:[]}); renderForms();}
function removeDeviation(moduleId,index){const list=ensureModuleData(moduleId).deviations; list.splice(index,1); if(!list.length) list.push({floor:"",location:"",deviation:"",images:[]}); renderForms();}
function updateModuleField(moduleId,field,value){ensureModuleData(moduleId)[field]=value; renderReport();}
function updateDeviationField(moduleId,index,field,value){ensureModuleData(moduleId).deviations[index][field]=value; renderReport();}
function handleImageUpload(input,moduleId,index){const files=[...input.files]; if(!files.length) return; const target=ensureModuleData(moduleId).deviations[index].images; let loaded=0; files.forEach(file=>{const reader=new FileReader(); reader.onload=e=>{target.push(e.target.result); loaded++; if(loaded===files.length){renderForms(); renderReport();}}; reader.readAsDataURL(file);});}
function handleCoverUpload(input){const file=input.files&&input.files[0]; if(!file) return; const reader=new FileReader(); reader.onload=e=>{state.coverImage=e.target.result; renderReport();}; reader.readAsDataURL(file);}
function moduleFormsMarkup(){if(!state.selectedModules.length) return '<div class="muted small">Ingen kontrollpunkter valgt ennå.</div>'; return state.selectedModules.map(id=>{const def=moduleDefs.find(x=>x.id===id); const data=ensureModuleData(id); return `<div class="moduleForm"><div class="moduleHeader"><div><h3>${id}. ${def.title}</h3><div class="tiny muted">Kun dette skjemaet kommer med i rapporten når punktet er valgt.</div></div><span class="pill">${data.deviations.length} avvik</span></div><div class="row2"><div><label>Kontroll utført</label><select onchange="updateModuleField(${id}, 'performed', this.value === 'true')"><option value="true" ${data.performed?"selected":""}>Ja</option><option value="false" ${!data.performed?"selected":""}>Nei</option></select></div><div><label>Oppsummering</label><select onchange="updateModuleField(${id}, 'summary', this.value)"><option value="green" ${data.summary==='green'?'selected':''}>Ingen registrerte avvik</option><option value="red" ${data.summary==='red'?'selected':''}>Registrerte avvik</option></select></div></div>${data.deviations.map((d,idx)=>`<div class="findingCard"><h4>Avvik ${idx+1}</h4><div class="row3"><div><label>Etg</label><input value="${escapeHtml(d.floor)}" oninput="updateDeviationField(${id}, ${idx}, 'floor', this.value)" placeholder="F.eks. 2" /></div><div><label>Plassering</label><input value="${escapeHtml(d.location)}" oninput="updateDeviationField(${id}, ${idx}, 'location', this.value)" placeholder="F.eks. Kiwi - lager" /></div><div><label>Avvik</label><input value="${escapeHtml(d.deviation)}" oninput="updateDeviationField(${id}, ${idx}, 'deviation', this.value)" placeholder="Kort tekst" /></div></div><div class="uploadBox"><label>Bilder for dette avviket</label><input type="file" accept="image/*" multiple onchange="handleImageUpload(this, ${id}, ${idx})" /><div class="tiny muted">Fungerer både for opplasting og mobilkamera dersom enheten tilbyr kamera i filvelgeren.</div><div class="thumbs">${d.images.map(src=>`<img src="${src}" alt="avviksbilde" />`).join('')}</div></div><div class="btnRow"><button type="button" class="btnGhost" onclick="removeDeviation(${id}, ${idx})">Slett avvik</button></div></div>`).join('')}<div class="btnRow"><button type="button" class="btnSecondary" onclick="addDeviation(${id})">Legg til avvik</button></div></div>`;}).join('');}
function chunkRows(rows,firstPageLimit=4,nextPageLimit=6){const pages=[]; let remaining=[...rows]; if(remaining.length<=firstPageLimit){pages.push(remaining); return pages;} pages.push(remaining.splice(0,firstPageLimit)); while(remaining.length) pages.push(remaining.splice(0,nextPageLimit)); return pages;}
function statusCell(summary,fill){const cls=fill===summary?(fill==='green'?'fillGreen':'fillRed'):''; return `<td class="${cls}">${fill==='green'?'INGEN REGISTRERTE AVVIK':'REGISTRERTE AVVIK'}</td>`;}
function renderCoverPage(){const img=state.coverImage?`<img class="heroImg" src="${state.coverImage}" alt="Forsidebilde" />`:`<div class="heroImg" style="display:flex;align-items:center;justify-content:center;color:#666;font-size:13px;">Ingen forsidebilde lastet opp</div>`; return `<section class="page"><div class="brand"><div class="brandMark">BTG</div><div class="brandText">BRANNTEKNIKK<br/>GRENLAND AS</div></div><div class="mainTitle"><div class="flame">🔥</div><div>BRANNVERNDOKUMENTASJON</div></div>${img}<table class="reportTable"><tr><th class="sectionHead" colspan="2">Ansvarlige roller</th></tr><tr><td>Eier</td><td class="center">${escapeHtml(document.getElementById('owner').value||'')}</td></tr><tr><td>Eiers representant</td><td class="center">${escapeHtml(document.getElementById('ownerRep').value||'')}</td></tr><tr><td>Ant leietakere / brukere</td><td class="center">${escapeHtml(document.getElementById('tenants').value||'')}</td></tr></table><table class="reportTable"><tr><th class="sectionHead" colspan="2">Dokumenter</th></tr><tr><td>Brannkonsept</td><td class="center">${escapeHtml(document.getElementById('docConcept').value||'')}</td></tr><tr><td>Branntekniske tegninger</td><td class="center">${escapeHtml(document.getElementById('docDrawings').value||'')}</td></tr></table><div class="lawBox"><div class="head">Relevante lover, forskrifter eller interne prosedyrer kontrollen bygger på.</div><div class="item">Brann- og eksplosjonsvernloven</div><div class="item">Forskrift om brannforebygging</div><div class="item">Byggteknisk forskrift (TEK) – relevante kapitler</div><div class="item">NS og interne rutiner</div></div><table class="reportTable" style="margin-top:20px;"><tr><th class="sectionHead" colspan="2">Bygningsinformasjon</th></tr><tr><td>Bygningsnavn</td><td class="center">${escapeHtml(document.getElementById('buildingName').value||'')}</td></tr><tr><td>Adresse</td><td class="center">${escapeHtml(document.getElementById('address').value||'')}</td></tr><tr><td>Type bygning</td><td class="center">${escapeHtml(document.getElementById('buildingType').value||'')}</td></tr><tr><td>Areal</td><td class="center">${escapeHtml(document.getElementById('area').value||'')}</td></tr><tr><td>Objekt</td><td class="center">${escapeHtml(document.getElementById('objectRef').value||'')}</td></tr><tr><td>Brannklasse</td><td class="center">${escapeHtml(document.getElementById('fireClass').value||'')}</td></tr><tr><td>Risikoklasse</td><td class="center">${escapeHtml(document.getElementById('riskClass').value||'')}</td></tr><tr><td>TEK</td><td class="center">${escapeHtml(document.getElementById('tek').value||'')}</td></tr></table></section>`;}
function renderSummaryPage(){const selected=state.selectedModules.map(id=>{const def=moduleDefs.find(m=>m.id===id); const data=ensureModuleData(id); return `<tr><td>${id}</td><td>${escapeHtml(def.title)}</td><td class="${data.summary==='green'?'statusGreen':'statusRed'} summaryStatus">X</td></tr>`;}).join(''); return `<section class="page"><table class="reportTable moduleSummaryTable"><tr><th class="sectionHead" colspan="3">Branntekniske installasjoner som inngår i kontroll</th></tr><tr><td colspan="3" class="center"><strong>x= utført</strong> &nbsp;&nbsp; rød= registrerte avvik &nbsp;&nbsp; grønn= ingen registrerte avvik</td></tr>${selected||'<tr><td>–</td><td>Ingen kontrollpunkter valgt</td><td></td></tr>'}</table></section>`;}
function modulePages(){const pages=[]; state.selectedModules.forEach(id=>{const def=moduleDefs.find(m=>m.id===id); const data=ensureModuleData(id); const rows=data.deviations.filter(d=>d.floor||d.location||d.deviation||(d.images&&d.images.length)); const groups=chunkRows(rows.length?rows:[{floor:'',location:'',deviation:'',images:[]}]); groups.forEach((group,groupIndex)=>{const includeBullets=groupIndex===0; const rowsHtml=group.map(d=>`<tr><td>${escapeHtml(d.floor||'')}</td><td>${escapeHtml(d.location||'')}</td><td>${escapeHtml(d.deviation||'')}</td><td>${(d.images&&d.images.length)?`<img class="photo" src="${d.images[0]}" alt="bilde" />`:'<div class="emptyPhoto">Ingen bilde</div>'}</td></tr>`).join(''); pages.push(`<section class="page"><div class="modulePageTitle"><div>${id}</div><div>${escapeHtml(def.title.toUpperCase())}</div></div>${includeBullets?`<div class="bulletBox"><ul>${def.bullets.map(b=>`<li>${escapeHtml(b)}</li>`).join('')}</ul></div><table class="statusTable"><tr><td style="width:38%;">KONTROLL UTFØRT</td><td>${data.performed?'JA':'NEI'}</td></tr><tr><td>KONTROLL UTFØRT</td>${statusCell(data.summary,'green')}${statusCell(data.summary,'red')}</tr></table>`:'<div class="pageSpacer"></div>'}<table class="deviationTable"><tr><th>ETG</th><th>PLASSERING</th><th>AVVIK</th><th>BILDE</th></tr>${rowsHtml}</table></section>`);});}); return pages.join('');}
function renderForms(){document.getElementById('moduleOptions').innerHTML=moduleOptionsMarkup(); document.getElementById('moduleForms').innerHTML=moduleFormsMarkup();}
function renderReport(){document.getElementById('pages').innerHTML=[renderCoverPage(),renderSummaryPage(),modulePages()].join('');}
function toggleModule(id,checked){if(checked){if(!state.selectedModules.includes(id)) state.selectedModules.push(id);} else {state.selectedModules=state.selectedModules.filter(x=>x!==id);} state.selectedModules.sort((a,b)=>a-b); ensureModuleData(id); renderForms(); renderReport();}
document.getElementById('coverImage').addEventListener('change',function(){handleCoverUpload(this);}); ['buildingName','inspectionDate','owner','ownerRep','address','tenants','buildingType','area','objectRef','fireClass','riskClass','tek','docConcept','docDrawings'].forEach(id=>{document.getElementById(id).addEventListener('input',renderReport); document.getElementById(id).addEventListener('change',renderReport);});
